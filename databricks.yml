# This is a Databricks asset bundle definition for dbs_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dbs_project
  uuid: 3316252a-6d88-4eba-b6bc-3344069c3936

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-7e3d85b9-25a9.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-7e3d85b9-25a9.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/rbeauxisconsultor@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/rbeauxisconsultor@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: rbeauxisconsultor@gmail.com
        level: CAN_MANAGE
